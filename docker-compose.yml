services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: pay-gw-oracle
    environment:
      ORACLE_PASSWORD: oracle_dev_pwd
      APP_USER: payment_gateway
      APP_USER_PASSWORD: payment_gateway_pwd
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

  gateway:
    build: .
    container_name: pay-gw
    depends_on: [oracle]
    env_file: .env
    ports:
      - "3002:3002"
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

volumes:
  oracle_data:
